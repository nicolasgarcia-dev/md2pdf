<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>md2pdf</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github.min.css">
    <link rel="icon" href="data:,">
</head>
<body>
    <header class="toolbar">
        <div class="brand">md2pdf</div>
        <div class="controls">
            <label class="field">
                <span>Theme</span>
                <select id="theme"></select>
            </label>
            <label class="field">
                <span>Title</span>
                <input type="text" id="title" value="document" maxlength="120">
            </label>
            <label class="checkbox">
                <input type="checkbox" id="toc" checked>
                <span>Table of contents</span>
            </label>
            <label class="checkbox" title="Always render through Chromium for maximum fidelity (larger PDFs).">
                <input type="checkbox" id="hifi">
                <span>High fidelity</span>
            </label>
            <label class="button" for="upload">Upload .md</label>
            <input type="file" id="upload" accept=".md,.markdown,.txt,text/markdown,text/plain" hidden>
            <button id="download" class="button primary">Download PDF</button>
        </div>
    </header>

    <main class="workspace">
        <section class="pane editor-pane">
            <div class="pane-header">Editor</div>
            <textarea id="editor" spellcheck="false" placeholder="Write or paste Markdown here..."></textarea>
        </section>
        <section class="pane preview-pane">
            <div class="pane-header">Preview</div>
            <article id="preview" class="preview"></article>
        </section>
    </main>

    <div id="status" class="status" hidden></div>

    <script src="https://cdn.jsdelivr.net/npm/marked@14.1.3/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.2/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/common.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <script type="module">
        import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11.4.0/dist/mermaid.esm.min.mjs";
        window.mermaid = mermaid;
        mermaid.initialize({ startOnLoad: false, securityLevel: "strict" });
    </script>
    <script src="/static/app.js" defer></script>
</body>
</html>
