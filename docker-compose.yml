services:
  md2pdf:
    build: .
    container_name: md2pdf
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    read_only: true
    tmpfs:
      - /tmp:size=128m
      - /home/app/.cache:size=32m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 768m
    memswap_limit: 1280m
    pids_limit: 256
